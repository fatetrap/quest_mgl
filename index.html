    <meta charset="UTF-8" />

    <title>Quest 1: The Steppe</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;700&family=Cinzel:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
      /* Brutalist Custom Scrollbar */
      ::-webkit-scrollbar {
        width: 10px;
        background: #0f0b08;
      }
      ::-webkit-scrollbar-thumb {
        background: #4a3b32;
        border: 1px solid #78350f;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: #dc2626;
      }

      /* Film Grain / Dust Effect */
      .grain {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        pointer-events: none;
        z-index: 50;
        background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)' opacity='0.05'/%3E%3C/svg%3E");
        opacity: 0.15;
      }

      /* Shake Animation */
      @keyframes shake {
        0% { transform: translate(1px, 1px) rotate(0deg); }
        10% { transform: translate(-1px, -2px) rotate(-1deg); }
        20% { transform: translate(-3px, 0px) rotate(1deg); }
        30% { transform: translate(3px, 2px) rotate(0deg); }
        40% { transform: translate(1px, -1px) rotate(1deg); }
        50% { transform: translate(-1px, 2px) rotate(-1deg); }
        60% { transform: translate(-3px, 1px) rotate(0deg); }
        70% { transform: translate(3px, 1px) rotate(-1deg); }
        80% { transform: translate(-1px, -1px) rotate(1deg); }
        90% { transform: translate(1px, 2px) rotate(0deg); }
        100% { transform: translate(1px, -2px) rotate(-1deg); }
      }
      .animate-shake {
        animation: shake 0.4s cubic-bezier(.36,.07,.19,.97) both;
      }

      /* Fade In Animation */
      @keyframes fadeIn {
        from { opacity: 0; transform: translateY(10px); }
        to { opacity: 1; transform: translateY(0); }
      }
      .animate-fade-in {
        animation: fadeIn 0.5s ease-out forwards;
      }

      /* Glitch Text Effect (Retained for impact, but styled warmer) */
      .glitch {
        position: relative;
      }
      .glitch::before,
      .glitch::after {
        content: attr(data-text);
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
      }
      .glitch::before {
        left: 2px;
        text-shadow: -1px 0 #b91c1c;
        clip: rect(24px, 550px, 90px, 0);
        animation: glitch-anim-2 3s infinite linear alternate-reverse;
      }
      .glitch::after {
        left: -2px;
        text-shadow: -1px 0 #d97706;
        clip: rect(85px, 550px, 140px, 0);
        animation: glitch-anim 2.5s infinite linear alternate-reverse;
      }
      @keyframes glitch-anim {
        0% { clip: rect(14px, 9999px, 121px, 0); }
        20% { clip: rect(67px, 9999px, 8px, 0); }
        40% { clip: rect(31px, 9999px, 59px, 0); }
        60% { clip: rect(95px, 9999px, 22px, 0); }
        80% { clip: rect(56px, 9999px, 10px, 0); }
        100% { clip: rect(11px, 9999px, 84px, 0); }
      }
      @keyframes glitch-anim-2 {
        0% { clip: rect(65px, 9999px, 119px, 0); }
        20% { clip: rect(22px, 9999px, 14px, 0); }
        40% { clip: rect(91px, 9999px, 36px, 0); }
        60% { clip: rect(14px, 9999px, 102px, 0); }
        80% { clip: rect(34px, 9999px, 66px, 0); }
        100% { clip: rect(88px, 9999px, 20px, 0); }
      }
    </style>
